<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rnow - L'IA Créatrice de Voyages</title>
    <style>
        /* --- DESIGN IDENTITY: RNOW (Inspiré par ton image) --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fcfcfc; /* Blanc très propre */
            color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* L'accent de couleur fluide en arrière-plan */
        .accent-blob {
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f03e7e 0%, #7e3ef0 100%);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            z-index: 0;
        }

        h1 {
            font-size: 4rem; /* Typo Massive */
            font-weight: 900;
            margin: 0 0 30px 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
            position: relative;
            z-index: 1;
        }

        h1 span {
            display: block;
            background: linear-gradient(90deg, #f03e7e, #7e3ef0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            font-weight: 700; /* Gras comme sur ton image */
            font-size: 1.1rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #eeeeee; /* Bordure légère mais pro */
            background-color: #fafafa;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box; /* IMPORTANT : Garde tout aligné */
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #7e3ef0;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(126, 62, 240, 0.1);
        }

        /* --- CORRECTION DE L'ALIGNEMENT --- */
        .row {
            display: flex;
            gap: 20px; /* Espace précis entre les colonnes */
            width: 100%;
            margin-bottom: 24px;
        }

        .row .form-group {
            flex: 1; /* Force les deux cases à faire 50/50 exactement */
            margin-bottom: 0; /* Annule la marge du bas pour l'alignement */
        }

        button {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 14px;
            background: #000000; /* Noir pour le côté luxe/sérieux */
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            margin-top: 10px;
        }

        button:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Zone de Résultat */
        #resultat {
            margin-top: 40px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 16px;
            border-left: 5px solid #7e3ef0;
            display: none;
            position: relative;
            z-index: 1;
        }

        #resultat h2 {
            font-weight: 900;
            font-size: 1.5rem;
            margin-top: 0;
            text-transform: uppercase;
        }

        #itineraire-content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
        }

        /* Loader simple */
        .loader {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #7e3ef0;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="accent-blob"></div>

        <h1>Welcome<br>on <span>Rnow</span></h1>
        
        <form id="voyageForm">
            <div class="form-group">
                <label for="destination">Où souhaites-tu aller ?</label>
                <input type="text" id="destination" placeholder="Ex: Tokyo, Islande, New York..." required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="dateDepart">Date de départ</label>
                    <input type="date" id="dateDepart" required>
                </div>
                <div class="form-group">
                    <label for="duree">Nombre de jours</label>
                    <input type="number" id="duree" placeholder="Ex: 7" min="1" required>
                </div>
            </div>

            <div class="form-group">
                <label for="budget">Budget total maximum (€)</label>
                <input type="number" id="budget" placeholder="Ex: 2500" required>
            </div>

            <div class="form-group">
                <label for="hebergement">Type d'hébergement</label>
                <input type="text" id="hebergement" placeholder="Ex: Hôtel 5*, Airbnb, Villa...">
            </div>

            <div class="form-group">
                <label for="styleVoyage">Style de voyage & envies</label>
                <textarea id="styleVoyage" placeholder="Ex: Gastronomie, Aventure, Détente, Shopping..."></textarea>
            </div>

            <button type="submit" id="btnGenerer">Générer mon voyage</button>
            <div class="loader" id="loader">L'IA analyse les meilleures options...</div>
        </form>

        <div id="resultat">
            <h2>Ton Itinéraire Rnow</h2>
            <div id="itineraire-content"></div>
        </div>
    </div>

    <script>
        document.getElementById('voyageForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const btn = document.getElementById('btnGenerer');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('resultat');
            const contentDiv = document.getElementById('itineraire-content');

            // Animation
            btn.style.display = 'none';
            loader.style.display = 'block';

            // Récupération des infos
            const dest = document.getElementById('destination').value;
            const budget = document.getElementById('budget').value;
            const style = document.getElementById('styleVoyage').value;

            // Simulation de l'IA
            setTimeout(() => {
                loader.style.display = 'none';
                btn.style.display = 'block';
                resultDiv.style.display = 'block';

                contentDiv.innerHTML = `
**Destination :** ${dest}
**Budget :** ${budget} €
**Style :** ${style}

---

### 🗓️ TON PLANNING SUR-MESURE

**Jour 1 : L'arrivée Luxe**
• Transfert privé vers ton hébergement.
• Cocktail de bienvenue avec vue panoramique.
• Dîner gastronomique pour découvrir les saveurs locales.

**Jour 2 : Immersion & Culture**
• Matinée : Visite privée des lieux iconiques sans la foule.
• Après-midi : Activité personnalisée (Atelier local ou Shopping privé).

*(Ceci est une simulation. Connecte ta clé API pour avoir un itinéraire réel et complet !)*

---
🚀 **Rnow PRO :** Bientôt, accède aux vrais tarifs d'avions et d'hôtels en temps réel.
                `;
            }, 2000);
        });
    </script>
</body>
</html>
