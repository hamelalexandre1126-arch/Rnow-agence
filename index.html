<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rnow - L'IA Créatrice de Voyages</title>
    <style>
        /* --- DESIGN IDENTITY: RNOW --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fcfcfc;
            color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .accent-blob {
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f03e7e 0%, #7e3ef0 100%);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            z-index: 0;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin: 0 0 30px 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
            position: relative;
            z-index: 1;
        }

        h1 span {
            display: block;
            background: linear-gradient(90deg, #f03e7e, #7e3ef0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #eeeeee;
            background-color: #fafafa;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #7e3ef0;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(126, 62, 240, 0.1);
        }

        .row {
            display: flex;
            gap: 20px;
            width: 100%;
            margin-bottom: 24px;
        }

        .row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 14px;
            background: #000000;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            margin-top: 10px;
        }

        button:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        #resultat {
            margin-top: 40px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 16px;
            border-left: 5px solid #7e3ef0;
            display: none;
            position: relative;
            z-index: 1;
        }

        #resultat h2 {
            font-weight: 900;
            font-size: 1.5rem;
            margin-top: 0;
            text-transform: uppercase;
        }

        #itineraire-content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
            font-size: 0.95rem;
        }

        .loader {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #7e3ef0;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="accent-blob"></div>

        <h1>Welcome<br>on <span>Rnow</span></h1>
        
        <form id="voyageForm">
            <div class="form-group">
                <label for="destination">Où souhaites-tu aller ?</label>
                <input type="text" id="destination" placeholder="Ex: Tokyo, Islande, New York..." required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="dateDepart">Date de départ</label>
                    <input type="date" id="dateDepart" required>
                </div>
                <div class="form-group">
                    <label for="duree">Nombre de jours</label>
                    <input type="number" id="duree" placeholder="Ex: 7" min="1" required>
                </div>
            </div>

            <div class="form-group">
                <label for="budget">Budget total maximum (€)</label>
                <input type="number" id="budget" placeholder="Ex: 2500" required>
            </div>

            <div class="form-group">
                <label for="hebergement">Type d'hébergement</label>
                <input type="text" id="hebergement" placeholder="Ex: Hôtel 5*, Airbnb, Villa...">
            </div>

            <div class="form-group">
                <label for="styleVoyage">Style de voyage & envies</label>
                <textarea id="styleVoyage" placeholder="Ex: Gastronomie, Aventure, Détente, Shopping..."></textarea>
            </div>

            <button type="submit" id="btnGenerer">Générer mon voyage</button>
            <div class="loader" id="loader">Rnow prépare ton itinéraire sur-mesure... <br> (Cela peut prendre 30 secondes)</div>
        </form>

        <div id="resultat">
            <h2>Ton Itinéraire Rnow</h2>
            <div id="itineraire-content"></div>
        </div>
    </div>

    <script>
        document.getElementById('voyageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGenerer');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('resultat');
            const contentDiv = document.getElementById('itineraire-content');

            // Animation
            btn.style.display = 'none';
            loader.style.display = 'block';
            resultDiv.style.display = 'none';

            // Récupération des infos du formulaire
            const payload = {
                destination: document.getElementById('destination').value,
                budget: document.getElementById('budget').value,
                style: document.getElementById('styleVoyage').value,
                date: document.getElementById('dateDepart').value,
                duree: document.getElementById('duree').value,
                hebergement: document.getElementById('hebergement').value
            };

            try {
                // APPEL RÉEL À TON SERVEUR VERCEL
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.text) {
                    // Affichage du vrai itinéraire généré par Gemini
                    contentDiv.innerText = data.text;
                } else {
                    contentDiv.innerText = "Désolé, une erreur est survenue lors de la génération. Vérifie que ta clé API est bien configurée dans Vercel.";
                }
            } catch (error) {
                console.error(error);
                contentDiv.innerText = "Erreur de connexion. Assure-toi que ton site est bien déployé sur Vercel.";
            }

            loader.style.display = 'none';
            btn.style.display = 'block';
            resultDiv.style.display = 'block';
            
            // Scroll automatique vers le résultat
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
