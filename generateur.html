<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rnow | Personnalisation Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap');
        :root { --primary: #7e3ef0; --secondary: #f03e7e; --dark: #000; }
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #fff; background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 120px 20px; box-sizing: border-box; overflow-x: hidden; }
        .bg-blur { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.2; z-index: -1; }
        .blur-1 { background: var(--primary); top: -100px; left: -100px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.6rem; text-decoration: none; color: #fff; }
        .logo span { color: var(--primary); }
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 40px; z-index: 10; }
        .box { background: #fff; border-radius: 40px; padding: 50px; color: #000; box-shadow: 0 40px 100px rgba(126,62,240,0.2); }
        h1 { font-size: 2.2rem; text-align: center; text-transform: uppercase; margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #777; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid #f4f4f4; background: #fafafa; font-family: inherit; box-sizing: border-box; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 250px; }
        .btn-main { width: 100%; padding: 22px; border: none; border-radius: 20px; background: #000; color: #fff; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.4s; }
        
        /* Loader Animation */
        .loader-container { display: none; margin: 30px 0; width: 100%; }
        .progress-bar { width: 100%; height: 6px; background: #f0f0f0; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); animation: loading 3s infinite; }
        @keyframes loading { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
        
        #voyages-container { display: flex; flex-direction: column; gap: 40px; width: 100%; }
        .itineraire-box { background: #fff; border-radius: 40px; padding: 50px; color: #000; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .itineraire-content { font-size: 1.05rem; line-height: 2.2; white-space: pre-wrap; margin-bottom: 30px; }
        .rnow-link { color: var(--primary); font-weight: bold; text-decoration: underline; }

        @media (max-width: 600px) {
            nav { padding: 15px 20px; }
            .box, .itineraire-box { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-blur blur-1"></div>
    <nav><a href="index.html" class="logo">R<span>now</span>.</a></nav>
    <div class="container">
        <div class="box">
            <h1>Crée ton <span>Voyage</span></h1>
            <form id="voyageForm">
                <div class="row">
                    <div class="form-group col"><label>Départ</label><input type="text" id="depart" placeholder="Paris" required></div>
                    <div class="form-group col"><label>Destination</label><input type="text" id="destination" placeholder="Tulum" required></div>
                </div>
                <div class="row">
                    <div class="form-group col"><label>Date</label><input type="date" id="dateDepart" required></div>
                    <div class="form-group col"><label>Niveau de confort</label>
                        <select id="confort">
                            <option value="Backpacker">🎒 Backpacker</option>
                            <option value="Standard" selected>🚗 Standard</option>
                            <option value="Luxe">👑 Luxe</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Budget total (€)</label><input type="number" id="budget" placeholder="1500" required></div>
                <div class="form-group"><label>Durée (jours)</label><input type="number" id="duree" placeholder="7" required></div>
                <button type="button" id="btnGenerer" class="btn-main">Générer mon voyage ✨</button>
                <div id="loader" class="loader-container">
                    <div style="text-align:center; color: var(--primary); font-weight:900; margin-bottom:10px; font-size:0.8rem;">L'IA RNW SCULPTE VOTRE CARNET...</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
            </form>
        </div>
        <div id="voyages-container"></div>
    </div>
    <script>
        let versionVoyage = 1;
        function formaterTexte(t) { return t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" class="rnow-link">$1</a>'); }
        document.getElementById('btnGenerer').onclick = async function() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            const payload = { type: "initial", depart: document.getElementById('depart').value, destination: document.getElementById('destination').value, budget: document.getElementById('budget').value, confort: document.getElementById('confort').value, date: document.getElementById('dateDepart').value, duree: document.getElementById('duree').value };
            const res = await fetch('/api/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.text) {
                const container = document.getElementById('voyages-container');
                const boite = document.createElement('div');
                boite.className = 'itineraire-box';
                boite.innerHTML = `<h2>Voyage Rnow V${versionVoyage}</h2><div class="itineraire-content">${formaterTexte(data.text)}</div><button class="btn-main" style="background:#25D366" onclick="window.open('https://wa.me/?text=${encodeURIComponent(data.text)}')">RECEVOIR SUR WHATSAPP 📱</button>`;
                container.prepend(boite);
                versionVoyage++;
            }
            loader.style.display = 'none';
        };
    </script>
</body>
</html>
