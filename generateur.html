<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rnow | Personnalisation Premium</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap');
        
        :root { --primary: #7e3ef0; --secondary: #f03e7e; --dark: #000000; }

        body { font-family: 'Poppins', sans-serif; margin: 0; color: #fff; background-color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 140px 20px 80px 20px; box-sizing: border-box; }

        .bg-blur { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(140px); opacity: 0.22; z-index: -1; pointer-events: none; }
        .blur-1 { background: var(--primary); top: -200px; left: -200px; }
        .blur-2 { background: var(--secondary); bottom: -200px; right: -200px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 60px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.1); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; box-sizing: border-box; }
        .logo { font-weight: 900; font-size: 1.8rem; text-transform: uppercase; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }
        .nav-links a { text-decoration: none; color: white; font-weight: 700; margin-left: 35px; font-size: 0.85rem; text-transform: uppercase; }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 45px; z-index: 10; }
        .box { background: #ffffff; border-radius: 45px; padding: 60px; box-shadow: 0 40px 120px rgba(126, 62, 240, 0.25); color: #000; }
        
        h1 { font-size: 2.5rem; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 45px; }
        h1 span { color: var(--primary); }
        
        .form-group { margin-bottom: 30px; width: 100%; }
        label { display: block; font-weight: 800; margin-bottom: 12px; font-size: 0.75rem; text-transform: uppercase; color: #777; }
        input, textarea, select { width: 100%; padding: 20px; border-radius: 18px; border: 2px solid #f4f4f4; font-family: inherit; font-size: 1.05rem; box-sizing: border-box; background: #fafafa; }
        
        .row { display: flex; gap: 25px; width: 100%; } 
        .btn-main { width: 100%; padding: 24px; border: none; border-radius: 22px; background: #000; color: #fff; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.4s; margin-top: 15px; }
        .btn-main:hover { background: var(--primary); transform: translateY(-6px); }
        
        #voyages-container { display: flex; flex-direction: column; gap: 45px; width: 100%; }
        .itineraire-box { background: #fff; border-radius: 45px; padding: 65px; box-shadow: 0 50px 130px rgba(0,0,0,0.6); color: #000; animation: fadeIn 0.8s ease forwards; position: relative; }
        .itineraire-box h2 { font-weight: 900; text-transform: uppercase; color: var(--primary); margin-bottom: 35px; font-size: 1.5rem; }
        .itineraire-content { color: #1a1a1a; font-size: 1.15rem; line-height: 2.6; white-space: pre-wrap; margin-bottom: 30px; }

        .btn-real-search { background: var(--primary); margin-top: 20px; }
        .loader-text { color: var(--primary); font-weight: 700; display: none; margin-top: 15px; font-size: 0.9rem; text-transform: uppercase; text-align: center; }

        #modifs-zone { display: none; border: 3px solid var(--secondary); background: #fff; }
        .btn-modif { background: var(--secondary); }
        .loader { display: none; text-align: center; font-weight: 900; color: var(--primary); margin: 40px 0; text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-blur blur-1"></div><div class="bg-blur blur-2"></div>
    
    <nav>
        <a href="index.html" class="logo">R<span>now</span>.</a>
        <div class="nav-links">
            <a href="index.html#vision">Notre Vision</a>
            <a href="index.html#about">À Propos</a>
            <a href="generateur.html" style="color: var(--secondary);">Lancer l'IA</a>
        </div>
    </nav>

    <div class="container">
        <div class="box">
            <h1>Crée ton <span>Voyage</span></h1>
            <form id="voyageForm">
                <div class="row">
                    <div class="form-group"><label>Départ</label><input type="text" id="depart" placeholder="Ex: Paris" required></div>
                    <div class="form-group"><label>Destination</label><input type="text" id="destination" placeholder="Ex: Tulum" required></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Date de départ</label><input type="date" id="dateDepart" required></div>
                    <div class="form-group"><label>Durée (jours)</label><input type="number" id="duree" placeholder="7" required></div>
                </div>
                <div class="form-group"><label>Budget total (€)</label><input type="number" id="budget" placeholder="1500" required></div>
                <div class="form-group"><label>Rythme souhaité</label>
                    <select id="rythme">
                        <option value="Détendu">Détendu</option>
                        <option value="Équilibré" selected>Équilibré</option>
                        <option value="Intense">Intense</option>
                    </select>
                </div>
                <div class="form-group"><label>Hébergement idéal</label><input type="text" id="hebergement" placeholder="Style d'hôtel..."></div>
                <div class="form-group"><label>Tes envies</label><textarea id="styleVoyage" rows="3" placeholder="Surf, gastronomie..."></textarea></div>
                <button type="button" id="btnGenerer" class="btn-main">Générer mon voyage ✨</button>
            </form>
            <div id="loader-initial" class="loader">Rnow sculpte votre aventure... 🌴</div>
        </div>

        <div id="voyages-container"></div>

        <div id="modifs-zone" class="box">
            <h3>Une modification ? Dis-moi ce que tu aimes ou pas :</h3>
            <textarea id="feedbackClient" rows="4" placeholder="Ex: L'hôtel est trop moderne..."></textarea>
            <button id="btnAffiner" class="btn-main btn-modif">Affiner mon itinéraire ⚡</button>
            <div id="loader-modif" class="loader">Rnow ajuste votre voyage... ✨</div>
        </div>
    </div>

    <script>
        let dernierItineraire = "";
        let versionVoyage = 1;

        async function appelerAPI(payload) {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        document.getElementById('btnGenerer').addEventListener('click', async function(e) {
            e.preventDefault();
            const loader = document.getElementById('loader-initial');
            const voyagesContainer = document.getElementById('voyages-container');

            loader.style.display = 'block';
            voyagesContainer.innerHTML = "";
            versionVoyage = 1;

            const payload = {
                type: "initial",
                depart: document.getElementById('depart').value,
                destination: document.getElementById('destination').value,
                budget: document.getElementById('budget').value,
                style: document.getElementById('styleVoyage').value,
                date: document.getElementById('dateDepart').value,
                duree: document.getElementById('duree').value,
                hebergement: document.getElementById('hebergement').value,
                rythme: document.getElementById('rythme').value
            };

            const data = await appelerAPI(payload);
            if (data.text) {
                dernierItineraire = data.text;
                ajouterVoyageAuConteneur(data.text);
                document.getElementById('modifs-zone').style.display = 'block';
            }
            loader.style.display = 'none';
        });

        document.getElementById('btnAffiner').addEventListener('click', async function() {
            const feedback = document.getElementById('feedbackClient').value;
            if (!feedback) return alert("Dis-moi ce que tu veux changer !");
            const loader = document.getElementById('loader-modif');
            loader.style.display = 'block';

            const payload = { type: "correction", ancienItineraire: dernierItineraire, feedback: feedback };
            const data = await appelerAPI(payload);
            if (data.text) {
                dernierItineraire = data.text;
                versionVoyage++;
                ajouterVoyageAuConteneur(data.text);
                document.getElementById('feedbackClient').value = "";
            }
            loader.style.display = 'none';
            document.getElementById('voyages-container').lastElementChild.scrollIntoView({ behavior: 'smooth' });
        });

        // FONCTION POUR LANCER LA RECHERCHE REELLE SUR UNE VERSION SPECIFIQUE
        async function lancerRechercheReelle(button, textElement) {
            button.disabled = true;
            button.innerText = "RECHERCHE EN COURS (30s)... ✈️";

            try {
                const data = await appelerAPI({
                    isRealSearch: true,
                    ancienItineraire: textElement.innerText
                });

                if (data.text) {
                    textElement.innerText = data.text;
                    button.style.display = 'none';
                    alert("Prix et liens réels ajoutés ! 🚀");
                }
            } catch (error) {
                alert("Erreur technique. Réessayez !");
                button.disabled = false;
                button.innerText = "TROUVER LES LIENS RÉELS ✨";
            }
        }

        function ajouterVoyageAuConteneur(texteItineraire) {
            const voyagesContainer = document.getElementById('voyages-container');
            const boite = document.createElement('div');
            boite.className = 'itineraire-box';
            
            // Création du titre
            const titre = document.createElement('h2');
            titre.innerText = `Ton Voyage Rnow - Version ${versionVoyage}`;
            
            // Création du contenu
            const contenu = document.createElement('div');
            contenu.className = 'itineraire-content';
            contenu.innerText = texteItineraire;
            
            // Création du bouton Recherche Active propre à CETTE boite
            const btnReal = document.createElement('button');
            btnReal.className = 'btn-main btn-real-search';
            btnReal.innerText = "CE VOYAGE ME CONVIENT, TROUVER LES LIENS RÉELS ✨";
            btnReal.onclick = () => lancerRechercheReelle(btnReal, contenu);

            boite.appendChild(titre);
            boite.appendChild(contenu);
            boite.appendChild(btnReal);
            voyagesContainer.appendChild(boite);
        }
    </script>
</body>
</html>
